name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["site/**", "hq-src/**", "tools/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Bundle committee HQ content
        run: node tools/build-hq.mjs
      - name: Exclude plaintext sources from deployment
        run: |
          mkdir deploy
          cp -r site/. deploy/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      - id: deployment
        uses: actions/deploy-pages@v4
