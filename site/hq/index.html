<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Station Crew — HQ</title>
<style>
  :root{
    --paper:#f6f5f1;--ink:#181713;--soft:#6d685d;--line:#e2dfd6;--card:#fdfcf9;
    --accent:#b93a21;--accent-soft:#f6e7e1;--gold:#877f6c;--gold-soft:#eeece4;
    --good:#31694a;--tag:#edebe3;--dig:#3c6478;--dig-soft:#e3ebef;
  }
  @media (prefers-color-scheme: dark){:root{
    --paper:#141311;--ink:#e8e5dd;--soft:#98937f;--line:#2c2a25;--card:#1c1b18;
    --accent:#e0603f;--accent-soft:#33201a;--gold:#a29a85;--gold-soft:#24221c;
    --good:#79b18c;--tag:#232119;--dig:#7fa5bb;--dig-soft:#1e2a31;}}
  *{box-sizing:border-box}
  :root{--mono:"Courier New",ui-monospace,SFMono-Regular,Menlo,monospace;
    --serif:Charter,Georgia,"Times New Roman",serif}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;line-height:1.65}
  main a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--accent);
    text-decoration-thickness:1px;text-underline-offset:3px}
  main a:hover{color:var(--accent)}
  /* ---- app ---- */
  #app{display:none}
  .layout{display:grid;grid-template-columns:16rem 1fr;min-height:100vh}
  nav{border-right:1px solid var(--line);padding:1.2rem 1rem 2rem;position:sticky;top:0;height:100vh;overflow-y:auto;
    background:var(--paper);scrollbar-width:thin}
  nav .brand{font-family:var(--serif);font-weight:700;font-size:1.1rem;margin-bottom:.1rem}
  nav .home{display:block;font-family:var(--mono);font-size:.64rem;letter-spacing:.06em;color:var(--soft);
    text-decoration:none;margin-bottom:1.2rem;padding:0 .1rem;text-transform:uppercase}
  nav .home:hover{color:var(--gold);background:none}
  nav .g{font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700;
    margin:1.5rem 0 .3rem;padding-bottom:.3rem;border-bottom:1px solid var(--line)}
  nav a{display:flex;gap:.5rem;align-items:baseline;padding:.42rem .35rem;color:var(--ink);
    text-decoration:none;font-size:.88rem;line-height:1.35;border-bottom:1px solid transparent}
  nav a .idx{font-family:var(--mono);font-size:.66rem;color:var(--soft);flex:none;width:2.1em}
  nav a.on{color:var(--accent);font-weight:600}
  nav a.on .idx{color:var(--accent)}
  nav a:hover{border-bottom-color:var(--line)}
  main{padding:2.4rem clamp(1.1rem,4vw,3rem) 6rem;max-width:50rem;min-width:0;
    margin:0 auto;width:100%;font-size:1.02rem}
  main p,main li{max-width:62ch}
  main li{margin:.45rem 0}
  /* ---- mobile top bar + drawer ---- */
  #topbar{display:none}
  #scrim{display:none}
  @media (max-width:760px){
    #topbar{display:flex;align-items:center;gap:.7rem;position:sticky;top:0;z-index:45;
      background:var(--paper);border-bottom:1px solid var(--line);padding:.55rem .9rem;
      box-shadow:0 2px 10px rgba(0,0,0,.07)}
    #topbar .tbrand{font-family:Charter,Georgia,serif;font-weight:700;font-size:1rem;flex:1;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #topbar .tpage{font-family:var(--mono);font-size:.64rem;letter-spacing:.04em;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38vw;text-transform:uppercase}
    #menu{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;
      width:2.4rem;height:2.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
    .layout{display:block}
    nav{position:fixed;left:0;top:0;bottom:0;height:100dvh;width:min(80vw,19rem);z-index:60;
      transform:translateX(-105%);transition:transform .22s ease;border-right:1px solid var(--line);
      box-shadow:12px 0 40px rgba(0,0,0,.25)}
    body.navopen nav{transform:none}
    #scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .22s}
    body.navopen #scrim{display:block;opacity:1;pointer-events:auto}
    nav a{padding:.6rem .7rem;font-size:.95rem}
    main{padding:1.3rem 1rem 5.5rem}
    table{font-size:.82rem}
  }
  /* ---- shared content styles (used by hq-src fragments) ---- */
  main{counter-reset:sec}
  main h1{font-family:var(--serif);font-size:clamp(1.7rem,5.5vw,2.5rem);line-height:1.12;margin:.5rem 0 .9rem;
    text-wrap:balance;letter-spacing:-.01em}
  main h1::after{content:"";display:block;height:1px;background:var(--line);margin-top:1rem;
    border-bottom:3px double var(--line)}
  main h2{font-family:var(--serif);font-size:clamp(1.2rem,3.8vw,1.45rem);margin:2.8rem 0 .6rem;
    border-bottom:1px solid var(--line);padding-bottom:.4rem;letter-spacing:-.005em}
  main h2::before{counter-increment:sec;content:"0" counter(sec);font-family:var(--mono);
    font-size:.62rem;letter-spacing:.15em;color:var(--accent);display:block;margin-bottom:.15rem}
  main h3{font-family:var(--serif);font-size:1.08rem;margin:1.4rem 0 .4rem}
  ::selection{background:var(--gold-soft)}
  .eyebrow{font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-top:2px solid var(--ink);
    border-radius:2px;padding:1rem 1.25rem;margin:1rem 0}
  .card h3{margin-top:0}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(15rem,1fr));gap:1rem}
  .spoiler{background:var(--accent-soft);border:1px dashed var(--accent);border-radius:10px;padding:.9rem 1.2rem;margin:1.2rem 0}
  .spoiler b{color:var(--accent)}
  .callout{background:var(--gold-soft);border:1px solid var(--line);border-left:3px solid var(--gold);
    border-radius:10px;padding:.9rem 1.2rem;margin:1.2rem 0}
  .tag{display:inline-block;background:none;border:1px solid var(--line);border-radius:2px;padding:.02rem .45rem;font-family:var(--mono);font-size:.64rem;font-weight:700;letter-spacing:.08em;vertical-align:middle;text-transform:uppercase}
  .tag.dig{border-color:var(--dig);color:var(--dig)}
  .tag.hand{border-color:var(--gold);color:var(--gold)}
  .tag.warn{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .tablewrap{overflow-x:auto;margin:1rem 0}
  table{border-collapse:collapse;width:100%;font-size:.88rem}
  th{text-align:left;font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);
    border-bottom:1.5px solid var(--ink);padding:.45rem .6rem;font-weight:700}
  td{border-bottom:1px solid var(--line);padding:.5rem .6rem;vertical-align:top}
  .num{font-family:var(--mono);font-size:.84em;font-variant-numeric:tabular-nums;white-space:nowrap}
  .strike{color:var(--soft);text-decoration:line-through}
  .answer{color:var(--good);font-weight:700}
  .script{font-family:Charter,Georgia,serif;font-style:italic;background:var(--tag);border-radius:8px;
    border-left:3px solid var(--gold);padding:.6rem 1rem;margin:.55rem 0}
  .steps{display:grid;gap:.7rem;margin:1rem 0}
  .step{display:grid;grid-template-columns:2rem 1fr;gap:.8rem;align-items:start}
  .step .n{width:1.8rem;height:1.8rem;border-radius:50%;border:2px solid var(--accent);color:var(--accent);
    font-weight:700;display:flex;align-items:center;justify-content:center;font-family:Charter,Georgia,serif;margin-top:.1rem}
  .step p{margin:.1rem 0}
  ul,ol{padding-left:1.2rem}
  li{margin:.3rem 0}
  .do{color:var(--good)} .dont{color:var(--accent)}
  .do::before{content:"✓ ";font-weight:700} .dont::before{content:"✗ ";font-weight:700}
  /* ---- role briefing card ---- */
  .brief{border:1px solid var(--ink);border-radius:3px;background:var(--card);margin:1.4rem 0 2.2rem;overflow:hidden}
  .brief .bh{font-family:var(--mono);font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--paper);background:var(--ink);padding:.45rem .9rem}
  .brief .bb{padding:.9rem 1rem 1rem}
  .brief ul{margin:.2rem 0;padding-left:1.1rem}
  .brief li{margin:.45rem 0}
  .brief .facts{display:flex;flex-wrap:wrap;gap:.4rem .6rem;margin-top:.9rem}
  .brief .facts span{font-family:var(--mono);font-size:.64rem;letter-spacing:.05em;border:1px solid var(--line);
    border-radius:2px;padding:.15rem .5rem;color:var(--soft)}
  .brief .facts b{color:var(--accent);font-weight:700}
  /* ---- on-this-page toc ---- */
  .ptoc{display:flex;flex-wrap:wrap;gap:.35rem .8rem;margin:1.1rem 0 .4rem;padding:0}
  .ptoc a{font-family:var(--mono);font-size:.66rem;letter-spacing:.05em;color:var(--soft);
    text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:.1rem}
  .ptoc a:hover{color:var(--accent);border-bottom-color:var(--accent)}
  .ptoc a i{font-style:normal;color:var(--accent);margin-right:.3em}
  .ptoc .zh{display:inline}
  /* ---- language toggle ---- */
  #langsw{position:fixed;bottom:1rem;right:1rem;z-index:50;display:flex;gap:.15rem;
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:.2rem;
    box-shadow:0 4px 14px rgba(0,0,0,.18)}
  #langsw button{border:none;background:none;color:var(--soft);font-size:.7rem;font-weight:700;
    padding:.25rem .65rem;border-radius:999px;cursor:pointer;font-family:var(--mono);letter-spacing:.04em}
  #langsw button.on{background:var(--accent-soft);color:var(--accent)}
  span.zh{display:block}
  span.zh.inline{display:inline}
  html[data-lang="en"] .zh{display:none!important}
  html[data-lang="zh"] .en{display:none!important}
  @media print{#langsw,#topbar,#scrim{display:none!important}}
</style>
</head>
<body>
<div id="app">
<header id="topbar">
  <button id="menu" aria-label="Open menu" aria-expanded="false"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6.5h16M4 12h16M4 17.5h16"/></svg></button>
  <span class="tbrand">Dead Air — HQ</span>
  <span class="tpage" id="tpage"></span>
</header>
<div id="scrim"></div>
<div class="layout">
  <nav id="nav"><div class="brand"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:-3px;margin-right:.3rem" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M7 8l9-5M6.5 12h6M6.5 15h6"/><circle cx="17" cy="14" r="2.5"/></svg>Dead Air — HQ</div><div style="font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;color:var(--soft);text-transform:uppercase;margin:-.1rem 0 .3rem">Case № 1926 · Confidential</div><a class="home" href="../">← Radio 1926 FM <span class="en inline" style="display:inline">home</span> <span class="zh inline">首页</span></a></nav>
  <main id="page"></main>
</div></div>

<div id="langsw" role="group" aria-label="Language">
  <button data-l="en">EN</button><button data-l="zh">中文</button><button data-l="both">EN+中</button>
</div>

<script>
const setLang = l => {
  document.documentElement.dataset.lang = l;
  try { localStorage.setItem("da:lang", l); } catch {}
  document.querySelectorAll("#langsw button").forEach(b => b.classList.toggle("on", b.dataset.l === l));
};
document.querySelectorAll("#langsw button").forEach(b => b.addEventListener("click", () => setLang(b.dataset.l)));
setLang((() => { try { return localStorage.getItem("da:lang") || "en"; } catch { return "en"; } })());

const menuBtn = document.getElementById("menu");
const setNav = open => {
  document.body.classList.toggle("navopen", open);
  menuBtn.setAttribute("aria-expanded", open);
};
menuBtn.addEventListener("click", () => setNav(!document.body.classList.contains("navopen")));
document.getElementById("scrim").addEventListener("click", () => setNav(false));
document.getElementById("nav").addEventListener("click", e => { if (e.target.closest("a")) setNav(false); });

let DB = null;

async function load() {
  const res = await fetch("payload.json", { cache: "no-store" });
  DB = await res.json();
  document.getElementById("app").style.display = "block";
  buildNav();
  route();
}
load();

function buildNav() {
  const nav = document.getElementById("nav");
  let group = null;
  for (const pg of DB.pages) {
    if (pg.group !== group) {
      group = pg.group;
      const g = document.createElement("div");
      g.className = "g"; g.textContent = group;
      nav.appendChild(g);
    }
    const a = document.createElement("a");
    a.href = "#" + pg.id; a.dataset.id = pg.id;
    const n = document.createElement("span");
    n.className = "idx";
    n.textContent = "N\u00b0" + String(DB.pages.indexOf(pg) + 1).padStart(2, "0");
    a.appendChild(n);
    a.appendChild(document.createTextNode(pg.title));
    nav.appendChild(a);
  }
}
function route() {
  if (!DB) return;
  const id = location.hash.slice(1) || DB.pages[0].id;
  const pg = DB.pages.find(p => p.id === id) || DB.pages[0];
  const page = document.getElementById("page");
  page.innerHTML = pg.html;
  const h2s = [...page.querySelectorAll("h2")];
  if (h2s.length >= 4) {
    const toc = document.createElement("div");
    toc.className = "ptoc";
    toc.setAttribute("role", "navigation");
    h2s.forEach((h, i) => {
      h.id = "s" + (i + 1);
      const a = document.createElement("a");
      a.href = "javascript:void(0)";
      a.innerHTML = "<i>" + String(i + 1).padStart(2, "0") + "</i>" + h.innerHTML;
      a.addEventListener("click", () => h.scrollIntoView({ behavior: "smooth", block: "start" }));
      toc.appendChild(a);
    });
    const h1 = page.querySelector("h1");
    if (h1) h1.after(toc);
  }
  document.querySelectorAll("nav a").forEach(a => a.classList.toggle("on", a.dataset.id === pg.id));
  document.getElementById("tpage").textContent = pg.title;
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", route);
</script>
</body>
</html>
