<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Radio 1926 FM</title>
<style>
  :root{--bg:#14120e;--ink:#ece7db;--soft:#a89f8d;--accent:#d4756f;--gold:#c9a55a;--line:#3a362d}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% -20%, #26231d, var(--bg));color:var(--ink);
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;text-align:center;padding:2rem}
  h1{font-family:Charter,Georgia,serif;font-size:clamp(2.2rem,7vw,3.6rem);margin:.2em 0;letter-spacing:.02em}
  .freq{color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.35em;font-size:.85rem;text-transform:uppercase}
  .onair{display:inline-block;border:2px solid var(--accent);color:var(--accent);border-radius:6px;
    padding:.3rem 1.2rem;font-weight:700;letter-spacing:.3em;margin:1.2rem 0;animation:flick 2.4s infinite}
  @keyframes flick{0%,92%,96%,100%{opacity:1}94%,98%{opacity:.25}}
  @media (prefers-reduced-motion: reduce){.onair{animation:none}}
  p{color:var(--soft);max-width:28rem;margin:1rem auto;line-height:1.6}
  a.crew{color:var(--soft);font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;
    text-decoration:none;border-bottom:1px dotted var(--soft);opacity:.7}
  a.crew:hover{color:var(--gold);border-color:var(--gold)}
  .wrap{max-width:34rem}
</style>
</head>
<body>
  <div class="wrap">
    <div class="freq">· · · Broadcasting since 1926 · · ·</div>
    <h1>RADIO 1926 FM</h1>
    <div class="onair">ON AIR</div>
    <p>We are currently experiencing technical difficulties.<br>Normal programming will resume shortly.</p>
    <svg viewBox="0 0 160 100" width="180" style="margin:.4rem auto;display:block" role="img" aria-label="Vintage radio">
      <path d="M118 30 L146 6" stroke="var(--soft)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="147" cy="5" r="3" fill="var(--gold)"/>
      <rect x="18" y="28" width="124" height="62" rx="10" fill="#26231d" stroke="var(--line)" stroke-width="2"/>
      <rect x="28" y="38" width="56" height="26" rx="4" fill="#0c0b08" stroke="var(--line)"/>
      <line x1="34" y1="51" x2="78" y2="51" stroke="var(--soft)" stroke-width="1"/>
      <g stroke="var(--soft)" stroke-width="1" opacity=".6">
        <line x1="38" y1="47" x2="38" y2="55"/><line x1="48" y1="48" x2="48" y2="54"/>
        <line x1="58" y1="47" x2="58" y2="55"/><line x1="68" y1="48" x2="68" y2="54"/>
      </g>
      <line x1="53" y1="42" x2="53" y2="60" stroke="var(--accent)" stroke-width="2"/>
      <circle cx="106" cy="51" r="12" fill="#0c0b08" stroke="var(--gold)" stroke-width="2"/>
      <line x1="106" y1="51" x2="113" y2="44" stroke="var(--gold)" stroke-width="2" stroke-linecap="round"/>
      <g stroke="var(--line)" stroke-width="2" stroke-linecap="round">
        <line x1="30" y1="72" x2="86" y2="72"/><line x1="30" y1="78" x2="86" y2="78"/><line x1="30" y1="84" x2="86" y2="84"/>
      </g>
      <circle cx="98" cy="76" r="4" fill="var(--line)"/>
      <circle cx="114" cy="76" r="4" fill="var(--line)"/>
      <circle cx="130" cy="76" r="4" fill="var(--accent)"/>
      <rect x="30" y="90" width="10" height="5" rx="2" fill="var(--line)"/>
      <rect x="120" y="90" width="10" height="5" rx="2" fill="var(--line)"/>
    </svg>
    <a class="crew" href="hq/">station crew entrance</a>
  </div>
</body>
</html>
